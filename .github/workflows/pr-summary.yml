name: PR Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 50,
            });

            const diffSummary = files.map(f =>
              '- ' + f.filename + ' (' + f.status + ', +' + f.additions + '/-' + f.deletions + ')\n' + (f.patch ? f.patch.slice(0, 1500) : '')
            ).join('\n\n').slice(0, 12000);

            const prompt =
              'You are a helpful code reviewer. Summarize this pull request clearly and concisely.\n\n' +
              'PR Title: ' + pr.title + '\n' +
              'PR Description: ' + (pr.body || 'No description provided.') + '\n\n' +
              'Changed files and diffs:\n' + diffSummary + '\n\n' +
              'Write a short summary with:\n' +
              '1. **What changed** (2-3 sentences)\n' +
              '2. **Files affected** (brief list)\n' +
              '3. **Anything to watch out for** (optional, only if relevant)\n\n' +
              'Keep it concise and useful for a reviewer.';

            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN,
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [{ role: 'user', content: prompt }],
                max_tokens: 500,
              }),
            });

            if (!response.ok) {
              throw new Error('GitHub Models API error: ' + response.status + ' ' + await response.text());
            }

            const data = await response.json();
            const summary = data.choices[0].message.content;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('<!-- pr-summary -->')
            );

            const body = '<!-- pr-summary -->\n## PR Summary\n\n' + summary + '\n\n<sub>Generated by GitHub Models (gpt-4o-mini)</sub>';

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
