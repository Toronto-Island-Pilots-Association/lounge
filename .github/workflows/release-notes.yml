# When dev is merged into main, creates a GitHub Release with AI-generated
# release notes. CHANGELOG.md is already updated on dev (by the release PR
# workflow) and merged with the release, so no separate changelog PR.
name: Release notes

on:
  push:
    branches:
      - main

jobs:
  release-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if not a merge (e.g. direct push)
        id: merge-check
        run: |
          PARENTS=$(git rev-list --parents -n 1 ${{ github.sha }} | wc -w)
          if [ "$PARENTS" -lt 3 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Not a merge commit. Skipping release notes."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.merge-check.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');

            const before = process.env.GITHUB_EVENT_BEFORE;
            const sha = process.env.GITHUB_SHA;
            if (!before || before === '0000000000000000000000000000000000000000') {
              console.log('Initial push or no previous commit. Skipping.');
              return;
            }

            const commits = execSync(`git log ${before}..${sha} --oneline --no-decorate`, { encoding: 'utf-8' });
            const files = execSync(`git diff --name-status ${before}..${sha} | head -100`, { encoding: 'utf-8' });
            const diffStat = execSync(`git diff --stat ${before}..${sha} | tail -50`, { encoding: 'utf-8' });
            const diffPreview = execSync(`git diff ${before}..${sha} | head -c 12000`, { encoding: 'utf-8' });

            const prompt =
              'You are writing release notes (changelog) for a software release.\n\n' +
              'Commits in this release:\n' + commits + '\n\n' +
              'Files changed:\n' + files + '\n\n' +
              'Diff stat:\n' + diffStat + '\n\n' +
              'Code diff (excerpt):\n' + diffPreview + '\n\n' +
              'Write release notes in Markdown with:\n' +
              '1. A short heading (e.g. "## [Unreleased] - 2025-03-03" or "## Release - 2025-03-03").\n' +
              '2. Sections like "### Added", "### Fixed", "### Changed" as needed.\n' +
              '3. Bullet points summarizing user-facing and notable changes. Be concise.\n' +
              'Do not include raw commit SHAs. Keep it readable for users.';

            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN,
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [{ role: 'user', content: prompt }],
                max_tokens: 800,
              }),
            });

            if (!response.ok) {
              throw new Error('GitHub Models API error: ' + response.status + ' ' + await response.text());
            }

            const data = await response.json();
            const releaseNotes = data.choices[0].message.content.trim();

            const shortSha = execSync('git rev-parse --short HEAD', { encoding: 'utf-8' }).trim();
            const date = new Date().toISOString().slice(0, 10);
            const tagName = 'release/' + date + '-' + shortSha;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: 'Release ' + date,
              body: releaseNotes + '\n\n---\n<sub>Generated by GitHub Models (gpt-4o-mini)</sub>',
              target_commitish: sha,
            });
            console.log('Created release: ' + tagName);
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
