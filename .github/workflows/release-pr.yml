# On every push to dev, updates the release PR (dev → main) with an AI-generated
# title and description, and prepends release notes to CHANGELOG.md on dev so
# the release PR includes the changelog (dev → main is the release).
#
# Required: enable "Allow GitHub Actions to create and approve pull requests"
# in repo Settings → Actions → General (or at org level first if grayed out).
name: Release PR (dev → main)

on:
  push:
    branches:
      - dev
  schedule:
    # Run daily at 9:00 UTC to catch drift
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Open or update release PR with AI title/description and changelog
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const ahead = parseInt(execSync('git rev-list --count origin/main..origin/dev 2>/dev/null || echo 0', { encoding: 'utf-8' }).trim(), 10);
            if (ahead === 0) {
              console.log('Dev is not ahead of main. Skipping.');
              return;
            }

            console.log('Dev is ' + ahead + ' commit(s) ahead of main.');

            const commits = execSync('git log origin/main..origin/dev --oneline --no-decorate | head -80', { encoding: 'utf-8' });
            const files = execSync('git diff --name-status origin/main...origin/dev | head -100', { encoding: 'utf-8' });
            const diffStat = execSync('git diff --stat origin/main...origin/dev | tail -50', { encoding: 'utf-8' });
            const diffPreview = execSync('git diff origin/main...origin/dev | head -c 12000', { encoding: 'utf-8' });

            // 1) PR title and description
            const prPrompt =
              'You are helping write a release pull request from dev to main.\n\n' +
              'Commits (dev ahead of main):\n' + commits + '\n\n' +
              'Files changed:\n' + files + '\n\n' +
              'Diff stat:\n' + diffStat + '\n\n' +
              'Code diff (excerpt):\n' + diffPreview + '\n\n' +
              'Respond with exactly:\n' +
              'Line 1: A short PR title (e.g. "Release: feature X, fixes Y") — no quotes, one line.\n' +
              'Line 2: A blank line.\n' +
              'Line 3+: A PR description in Markdown with these sections (omit a section if there are no items):\n' +
              '- **New features** — bullet list of user-facing or notable new functionality.\n' +
              '- **Bug fixes** — bullet list of fixes.\n' +
              '- **Other changes** (optional) — bullet list of refactors, deps, or other changes.\n' +
              'Keep each bullet concise. No raw commit SHAs.';

            const prResponse = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN,
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [{ role: 'user', content: prPrompt }],
                max_tokens: 800,
              }),
            });
            if (!prResponse.ok) {
              throw new Error('GitHub Models API error: ' + prResponse.status + ' ' + await prResponse.text());
            }
            const prData = await prResponse.json();
            const prContent = prData.choices[0].message.content.trim();
            const prLines = prContent.split('\n');
            const title = (prLines[0] || '').replace(/^["']|["']$/g, '').trim().slice(0, 256) || 'Release: dev → main';
            const body = prLines.slice(1).join('\n').trim().slice(0, 5000) ||
              'Release PR from dev to main. Review the diff before merging.';

            // 2) Changelog (release notes) for CHANGELOG.md
            const changelogPrompt =
              'You are writing release notes (changelog) for a software release.\n\n' +
              'Commits in this release:\n' + commits + '\n\n' +
              'Files changed:\n' + files + '\n\n' +
              'Diff stat:\n' + diffStat + '\n\n' +
              'Code diff (excerpt):\n' + diffPreview + '\n\n' +
              'Write release notes in Markdown with:\n' +
              '1. A short heading (e.g. "## [Unreleased] - 2025-03-03" or "## Release - 2025-03-03").\n' +
              '2. Sections like "### Added", "### Fixed", "### Changed" as needed.\n' +
              '3. Bullet points summarizing user-facing and notable changes. Be concise.\n' +
              'Do not include raw commit SHAs. Keep it readable for users.';

            const changelogResponse = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN,
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [{ role: 'user', content: changelogPrompt }],
                max_tokens: 800,
              }),
            });
            if (!changelogResponse.ok) {
              throw new Error('GitHub Models API error: ' + changelogResponse.status + ' ' + await changelogResponse.text());
            }
            const changelogData = await changelogResponse.json();
            const releaseNotes = changelogData.choices[0].message.content.trim();

            // Prepend to CHANGELOG.md on dev (so the release PR includes it)
            const changelogPath = 'CHANGELOG.md';
            const newSection = releaseNotes + '\n\n';
            let existing = '';
            try {
              existing = fs.readFileSync(changelogPath, 'utf-8');
            } catch (e) {
              existing = '# Changelog\n\nAll notable changes to this project are documented here.\n\n';
            }
            const updated = existing.startsWith('# Changelog') || existing.startsWith('# Changelog\n')
              ? existing.replace(/# Changelog\n\n/, '# Changelog\n\n' + newSection)
              : newSection + existing;
            fs.writeFileSync(changelogPath, updated);

            execSync('git config user.name "github-actions[bot]"', { encoding: 'utf-8' });
            execSync('git config user.email "github-actions[bot]@users.noreply.github.com"', { encoding: 'utf-8' });
            execSync('git add CHANGELOG.md', { encoding: 'utf-8' });
            let hasChangelogCommit = false;
            try {
              execSync('git commit -m "docs: update CHANGELOG for upcoming release [skip ci]"', { encoding: 'utf-8' });
              hasChangelogCommit = true;
            } catch (e) {
              if (!e.message.includes('nothing to commit')) throw e;
              console.log('CHANGELOG unchanged (nothing to commit).');
            }
            if (hasChangelogCommit) {
              execSync('git push origin dev', { encoding: 'utf-8' });
            }

            // 3) Create or update the release PR
            const prBody = body + '\n\n---\n<sub>Title, description and CHANGELOG generated by GitHub Models (gpt-4o-mini)</sub>';

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: context.repo.owner + ':dev',
              base: 'main',
            });

            if (pulls.length > 0) {
              const pr = pulls[0];
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                title,
                body: prBody,
              });
              console.log('Updated existing release PR #' + pr.number);
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: 'dev',
                base: 'main',
                title,
                body: prBody,
              });
              console.log('Created release PR #' + pr.number);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
