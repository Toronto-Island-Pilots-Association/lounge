# On every push to dev, updates the release PR (dev → main) with an AI-generated
# title and description so it always reflects the latest commits.
#
# Required: enable "Allow GitHub Actions to create and approve pull requests"
# in repo Settings → Actions → General (or at org level first if grayed out).
name: Release PR (dev → main)

on:
  push:
    branches:
      - dev
  schedule:
    # Run daily at 9:00 UTC to catch drift
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open or update release PR with AI title/description
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');

            const ahead = parseInt(execSync('git rev-list --count origin/main..origin/dev 2>/dev/null || echo 0', { encoding: 'utf-8' }).trim(), 10);
            if (ahead === 0) {
              console.log('Dev is not ahead of main. Skipping.');
              return;
            }

            console.log('Dev is ' + ahead + ' commit(s) ahead of main.');

            const commits = execSync('git log origin/main..origin/dev --oneline --no-decorate | head -80', { encoding: 'utf-8' });
            const files = execSync('git diff --name-status origin/main...origin/dev | head -100', { encoding: 'utf-8' });
            const diffStat = execSync('git diff --stat origin/main...origin/dev | tail -50', { encoding: 'utf-8' });
            const diffPreview = execSync('git diff origin/main...origin/dev | head -c 12000', { encoding: 'utf-8' });

            const prompt =
              'You are helping write a release pull request from dev to main.\n\n' +
              'Commits (dev ahead of main):\n' + commits + '\n\n' +
              'Files changed:\n' + files + '\n\n' +
              'Diff stat:\n' + diffStat + '\n\n' +
              'Code diff (excerpt):\n' + diffPreview + '\n\n' +
              'Respond with exactly:\n' +
              'Line 1: A short PR title (e.g. "Release: feature X, fixes Y") — no quotes, one line.\n' +
              'Line 2: A blank line.\n' +
              'Line 3+: A concise PR description (2–5 sentences) summarizing what this release includes and any notable changes. Use markdown if helpful.';

            const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.GITHUB_TOKEN,
              },
              body: JSON.stringify({
                model: 'gpt-4o-mini',
                messages: [{ role: 'user', content: prompt }],
                max_tokens: 600,
              }),
            });

            if (!response.ok) {
              throw new Error('GitHub Models API error: ' + response.status + ' ' + await response.text());
            }

            const data = await response.json();
            const content = data.choices[0].message.content.trim();

            const lines = content.split('\n');
            const title = (lines[0] || '').replace(/^["']|["']$/g, '').trim().slice(0, 256) || 'Release: dev → main';
            const body = lines.slice(1).join('\n').trim().slice(0, 5000) ||
              'Release PR from dev to main. Review the diff before merging.';

            const prBody = body + '\n\n---\n<sub>Title and description generated by GitHub Models (gpt-4o-mini)</sub>';

            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: context.repo.owner + ':dev',
              base: 'main',
            });

            if (pulls.length > 0) {
              const pr = pulls[0];
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                title,
                body: prBody,
              });
              console.log('Updated existing release PR #' + pr.number);
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: 'dev',
                base: 'main',
                title,
                body: prBody,
              });
              console.log('Created release PR #' + pr.number);
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
